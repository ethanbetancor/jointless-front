<form (ngSubmit)="sendValues()">
<div class="min-h-screen flex items-center justify-center bg-gray-100">
    <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-3xl font-bold text-center mb-6 text-gray-800">
            Register
        </h1>

        <div class="space-y-4">
            <div>
                <label class="block mb-1 font-medium text-gray-700">User:</label>
                <input
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    type="text" [value]="username()" (input)="username.set(usernameValue.value)" required
                    #usernameValue>
            </div>
            @if (usernameError()) {
            <p class="mt-1 text-sm text-red-600 bg-red-50 border border-red-200 rounded-md px-3 py-2">
                {{ usernameError() }}
            </p>
            }
            

            <div>
                <label class="block mb-1 font-medium text-gray-700">E-Mail:</label>
                <input
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    type="email" [value]="email()" (input)="email.set(emailValue.value)" required #emailValue>
            </div>
            @if (emailError()) {
            <p class="mt-1 text-sm text-red-600 bg-red-50 border border-red-200 rounded-md px-3 py-2">
                {{ emailError() }}
            </p>
            }

            <div>
                <label class="block mb-1 font-medium text-gray-700">Password:</label>
                <input
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    type="password" [value]="password()" (input)="password.set(passwValue.value)" required #passwValue>
            </div>
            @if (passwordError()) {
            <p class="mt-1 text-sm text-red-600 bg-red-50 border border-red-200 rounded-md px-3 py-2">
                {{ passwordError() }}
            </p>
            }

            <div>
                <label class="block mb-1 font-medium text-gray-700">Confirm Password:</label>
                <input
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    type="password" [value]="confirmPasswd()" (input)="confirmPasswd.set(confirmPasswdValue.value)"
                    required #confirmPasswdValue>
            </div>

            @if (confirmPasswdError()) {
            <p class="mt-1 text-sm text-red-600 bg-red-50 border border-red-200 rounded-md px-3 py-2">
                {{ confirmPasswdError() }}
            </p>
            }
            <button class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition"
                type="submit">
                Submit
            </button>
        </div>
    </div>
</div>
</form>
