<div>
    <table>

    </table>
    <form class="space-y-6" (ngSubmit)="sendValues()" >
        <div>
            @if (errorMessage()) {
                <p>
                    {{ errorMessage() }}
                </p>
            }
        </div>
        <div>
            <label htmlFor="password" class="block text-sm font-medium text-gray-700 mb-2">
                Nueva contraseña
            </label>
            <div class="relative">
                <input id="password" [type]="changeType?'password':'text'"
                    [value]="passwordNew()"
                    [ngModel]="passwordNew()"
                    [ngModelOptions]="{standalone: true}"
                    (ngModelChange)="passwordNew.set($event)"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition pr-12"
                    placeholder="••••••••" required
                    minlength="1"
                    #passwordInput="ngModel">
                    @if (passwordInput.invalid && passwordInput.touched) {
                        <p>La contraseña es obligatoria</p>
                    }
                    <button type="button" class="eyeicon" (click)="viewPassword()">
                        <i [ngClass]="visible?'fa fa-eye':'fa fa-eye-slash'"></i>
                    </button>
            </div>
        </div>
        <button 
            type="submit"
            class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-medium">
            Cambiar contraseña
        </button>
    </form>
</div>
