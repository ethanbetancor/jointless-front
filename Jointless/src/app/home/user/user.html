<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <div class="w-full max-w-md bg-white shadow-lg rounded-2xl p-8">
    <h2 class="text-2xl font-semibold text-gray-900 text-center">
        Cambiar contraseña
    </h2>
    <p class="text-sm text-gray-500 text-center mt-2">
        Introduce tu nueva contraseña
    </p>
    <form class="space-y-6 mt-6" (ngSubmit)="sendValues()">
        @if (message()) {
            <div class="mt-4 text-sm px-4 py-3 rounded-lg border flex items-center gap-2"
            [ngClass]="messageType() === 'success' ? 'bg-green-50 text-green-700 border-green-200':'bg-red-50 text-red-600 border-red-200'">
                {{ message() }}
            </div>
        }
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
            Nueva contraseña
            </label>
            <div class="relative">
                <input id="password" [type]="changeType ? 'password' : 'text'" [value]="passwordNew()"
                [ngModel]="passwordNew()" [ngModelOptions]="{ standalone: true }"
                (ngModelChange)="passwordNew.set($event);userTouchedPassword.set(true)"
                class="w-full px-4 py-3 pr-12 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                placeholder="••••••••" required minlength="1" #passwordInput="ngModel"/>
                <button type="button"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700 transition"
                (click)="viewPassword()">
                    <i [ngClass]="visible ? 'fa fa-eye' : 'fa fa-eye-slash'"></i>
                </button>
            </div>
            @if (passwordInput.invalid && userTouchedPassword()) {
                <p class="mt-2 text-sm text-red-600">
                    La contraseña es obligatoria
                </p>
            }
        </div>
        <button type="submit"
        class="w-full bg-blue-600 text-white py-3 rounded-lg font-medium shadow-sm hover:bg-blue-700 active:bg-blue-800 transition duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
            Cambiar contraseña
        </button>
    </form>
  </div>
</div>
