    <div class="body">
        @for (exercise of exercises().listSolutions; track exercise.solutionId){ 
            <div class="bg-white rounded-xl shadow-lg overflow-hidden border-2 border-gray-100 hover:shadow-xl transition-shadow">
                <div class="px-4 py-3 flex items-center justify-between bg-white">
                    <div class="px-3 py-1 text-sm font-semibold bg-gray-100 rounded-full">
                        {{ statement()[exercise.levelId] }}
                    </div>
                </div>
                <div class="px-4 py-3 flex items-center justify-between bg-white">
                    <div class="px-3 py-1 text-sm font-semibold bg-gray-100 rounded-full">
                        {{ titles()[exercise.levelId] }}
                    </div>
                </div>

                <div class="p-4">
                    <h3 class="font-bold text-gray-900 mb-3 text-sm leading-snug">
                        
                    </h3>

                    <!-- {/* Código */} -->
                    <div class="bg-gray-900 rounded-lg p-4 overflow-x-auto">
                        <div class="text-xs text-gray-100 font-mono leading-relaxed">
                            <code>{{exercise.code}}</code>
                        </div>
                    </div>

                    <!-- {/* Badge de completado */} -->
                    <div class="mt-3 flex items-center gap-2 text-green-600">
                        <!-- <CheckCircle size={16} /> -->
                        <span class="text-xs font-medium">Completado</span>
                    </div>
                </div>
            </div>
        }
    </div>
